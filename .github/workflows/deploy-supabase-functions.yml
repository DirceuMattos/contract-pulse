name: Deploy Supabase Edge Functions

# Deploya as edge functions no Supabase (projeto de origem) a cada push na main
# que altere algo em supabase/functions/**. Resolve a ausência de deploy automático:
# commitar no GitHub, por si só, NÃO deployava as functions até este workflow existir.
#
# Pré-requisito: cadastrar o secret SUPABASE_ACCESS_TOKEN no repositório
# (Settings → Secrets and variables → Actions). Gere o token em:
# Supabase → Account → Access Tokens.
#
# O project_id vem do supabase/config.toml (bjuxpqtsfnkaonczauxz), então não é
# necessário passá-lo aqui. As configs por função (verify_jwt, etc.) também são
# lidas do config.toml pela CLI.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  # Permite disparo manual pela aba Actions, útil para forçar um redeploy.
  workflow_dispatch:

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: bjuxpqtsfnkaonczauxz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verificar token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN não está configurado no repositório."
            echo "Cadastre em Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy das edge functions P0
        run: |
        set -euo pipefail
        functions=(manage-users feedz-test-photo)
        for fn in "${functions[@]}"; do
        echo "::group::Deploy $fn"
        supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
        echo "OK: $fn"
        echo "::endgroup::"
      done

      # ── Quando validado, trocar o passo acima por este (deploya TODAS): ──
      # - name: Deploy de todas as edge functions
      #   run: |
      #     set -euo pipefail
      #     shopt -s nullglob
      #     failed=()
      #     for dir in supabase/functions/*/; do
      #       fn="$(basename "$dir")"
      #       case "$fn" in _*) echo "Pulando $fn"; continue;; esac
      #       echo "::group::Deploy $fn"
      #       if supabase functions deploy "$fn" --project-ref "$PROJECT_REF"; then
      #         echo "OK: $fn"
      #       else
      #         echo "::error::Falhou o deploy de $fn"; failed+=("$fn")
      #       fi
      #       echo "::endgroup::"
      #     done
      #     if [ ${#failed[@]} -gt 0 ]; then
      #       echo "::error::Funcoes com falha: ${failed[*]}"; exit 1
      #     fi

      - name: Resumo
        if: success()
        run: echo "Deploy concluído. Confirme 'Last updated' e o contador Deployments no painel do Supabase."
